name: Deploy to fly.io

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE: registry.fly.io/zentro-backend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      # Tests already ran in ci.yml; skip them here to keep deploys fast.
      - name: Build jar
        run: ./mvnw package -DskipTests -B

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Authenticate Docker with fly.io registry
        run: fly auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            -f src/main/docker/Dockerfile.jvm \
            -t ${{ env.IMAGE }} .
          docker push ${{ env.IMAGE }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: fly deploy --image ${{ env.IMAGE }} --strategy immediate --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
