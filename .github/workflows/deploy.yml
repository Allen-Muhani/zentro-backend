name: Deploy to fly.io

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      # Tests already ran in ci.yml; skip them here to keep deploys fast.
      - name: Build jar
        run: ./mvnw package -DskipTests -B

      - name: Write Firebase credentials
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: echo "$FIREBASE_CREDENTIALS_JSON" > src/main/resources/zentro-fb00d-firebase-adminsdk-fbsvc-a4e70b2234.json

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --image-label ${{ github.sha }} --strategy immediate --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
