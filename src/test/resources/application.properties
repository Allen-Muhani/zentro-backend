# Use an in-memory H2 database so tests run without a PostgreSQL server
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create

# FirebaseAuthService is mocked in tests — skip SDK initialisation at startup
quarkus.arc.exclude-types=com.grandtech.config.FirebaseConfig
