# ── PostgreSQL ───────────────────────────────────────────────────────────────
# Override any value via the matching environment variable.
# Defaults below point to the local / test environment.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:zentro}
quarkus.datasource.password=${DB_PASSWORD:zentro}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:zentro_dev}

# ── Hibernate ORM ────────────────────────────────────────────────────────────
# "update" creates / alters tables automatically in dev; use "validate" in prod.
quarkus.hibernate-orm.database.generation=${DB_DDL_AUTO:update}

# ── Firebase ─────────────────────────────────────────────────────────────────
# Path to the service-account JSON downloaded from the Firebase console.
# Override with FIREBASE_CREDENTIALS_PATH in production.
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:src/main/resources/zentro-fb00d-firebase-adminsdk-fbsvc-a4e70b2234.json}
# Project ID is inferred from the credentials file.
# Set FIREBASE_PROJECT_ID explicitly if you need to override it.
